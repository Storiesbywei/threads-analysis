apiVersion: 1

datasources:
  - name: Threads Postgres
    type: grafana-postgresql-datasource
    uid: threads-pg
    access: proxy
    url: postgres:5432
    user: threads
    jsonData:
      database: threads
      sslmode: disable
      maxOpenConns: 5
      maxIdleConns: 2
      connMaxLifetime: 14400
    secureJsonData:
      password: ${POSTGRES_PASSWORD}
    isDefault: true
    editable: true
