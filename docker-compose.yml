services:
  # ─── Always runs: Postgres ─────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB: threads
      POSTGRES_USER: threads
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-threads_local_dev}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U threads -d threads"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Data layer: sync worker (auto-pulls every 30 min) ─────
  sync:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    profiles: [data, full]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      THREADS_ACCESS_TOKEN: ${THREADS_ACCESS_TOKEN}
      THREADS_USER_ID: ${THREADS_USER_ID}
      THREADS_APP_ID: ${THREADS_APP_ID}
      APP_SECRETS: ${APP_SECRETS}
      THREADS_USER_SECRETS: ${THREADS_USER_SECRETS}
      DATABASE_URL: postgres://threads:${POSTGRES_PASSWORD:-threads_local_dev}@postgres:5432/threads
      SYNC_INTERVAL_MINUTES: ${SYNC_INTERVAL_MINUTES:-60}
      METRICS_BATCH_SIZE: ${METRICS_BATCH_SIZE:-200}
      FULL_SYNC_ON_START: ${FULL_SYNC_ON_START:-false}
    volumes:
      - ./data:/app/data
      - ./public/data:/app/public/data

  # ─── Web layer: Astro dashboard on :4321 ───────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    restart: unless-stopped
    profiles: [web, full]
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4321:4321"
    environment:
      HOST: "0.0.0.0"
      PORT: "4321"
      DATABASE_URL: postgres://threads:${POSTGRES_PASSWORD:-threads_local_dev}@postgres:5432/threads
    volumes:
      - ./public/data:/app/public/data

  # ─── API layer: REST API on :4322 ──────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    profiles: [api, full]
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4322:4322"
    environment:
      HOST: "0.0.0.0"
      PORT: "4322"
      DATABASE_URL: postgres://threads:${POSTGRES_PASSWORD:-threads_local_dev}@postgres:5432/threads
      OLLAMA_URL: http://host.docker.internal:11434
    command: node scripts/api-server.mjs

  # ─── Flask API: iOS Shortcuts + Swagger UI on :4323 ─────
  flask-api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    profiles: [api, full]
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4323:4323"
    environment:
      DATABASE_URL: postgres://threads:${POSTGRES_PASSWORD:-threads_local_dev}@postgres:5432/threads
      OLLAMA_URL: http://host.docker.internal:11434
      FLASK_ENV: production

  # ─── Monitoring: Grafana on :3002 ─────────────────────────
  grafana:
    image: grafana/grafana-oss:latest
    restart: unless-stopped
    profiles: [monitoring, full]
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3002:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: threads
      GF_SERVER_HTTP_ADDR: "0.0.0.0"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-threads_local_dev}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards

  # ─── Pipeline: automated enrich → embed (→ cluster/palace require host Python) ─
  # Stages 3-5 (cluster, palace, naming) require Python + HDBSCAN/UMAP — run on host.
  # Docker pipeline runs stages 1,2,6 by default. Override PIPELINE_SKIP to customize.
  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    profiles: [pipeline, full]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://threads:${POSTGRES_PASSWORD:-threads_local_dev}@postgres:5432/threads
      OLLAMA_URL: http://host.docker.internal:11434
      PIPELINE_INTERVAL_HOURS: ${PIPELINE_INTERVAL_HOURS:-336}
      PIPELINE_SKIP: ${PIPELINE_SKIP:-3,4,5}
      BYTHEWEICO_DATA_DIR: /app/bytheweico-data
    volumes:
      - ./scripts:/app/scripts
      - ./output:/app/output
      - ./data:/app/data
      - ./public/data:/app/public/data
      - /Users/weixiangzhang/Local_Dev/projects/ByTheWeiCo/public/data:/app/bytheweico-data
    command: >
      sh -c 'while true; do
        echo "[$(date)] Running pipeline...";
        node scripts/pipeline.mjs --skip=$${PIPELINE_SKIP} 2>&1 | tee -a output/pipeline-docker.log;
        echo "[$(date)] Pipeline done. Sleeping $${PIPELINE_INTERVAL_HOURS}h...";
        sleep $$(($${PIPELINE_INTERVAL_HOURS} * 3600));
      done'

volumes:
  pgdata:
  grafana-data:
